schema: astra.sample.v1
id: astra.sample.nativevn
display_name: NativeVN
phase: 8
foundation_only: false
status: playable-demo
description: Redistributable Phase 8 VN playable demo using .astra story scripts, Lua extension schema fixtures, package payloads, UI evidence, save/load, replay, timeline, filter, and audio validation.
acceptance:
  - astra validate Samples/NativeVN --strict --json
  - astra cook Samples/NativeVN --config Release --json
  - astra package Samples/NativeVN --profile deterministic --json
  - astra run build/Saved/Packages/NativeVN.astrapkg --headless-smoke --json
  - astra run build/Saved/Packages/NativeVN.astrapkg --windowed-smoke --scripted-input Samples/NativeVN/Input/golden.yaml --auto-close --json
  - astra run build/Saved/Packages/NativeVN.astrapkg --windowed-smoke --scripted-input Samples/NativeVN/Input/qa/title_walk.yaml --auto-close --json
  - astra run build/Saved/Packages/NativeVN.astrapkg --windowed-smoke --scripted-input Samples/NativeVN/Input/qa/system_save_load_systems.yaml --auto-close --json
  - astra run build/Saved/Packages/NativeVN.astrapkg --windowed-smoke --scripted-input Samples/NativeVN/Input/qa/menu_reopen_smoke.yaml --auto-close --json
  - astra replay build/Saved/Replays/NativeVNGolden.replay --compare --json
  - astra inspect build/Saved/Packages/NativeVN.astrapkg --json
player_qa:
  matrix:
    - Samples/NativeVN/Input/qa/title_walk.yaml
    - Samples/NativeVN/Input/qa/system_save_load_systems.yaml
    - Samples/NativeVN/Input/qa/menu_reopen_smoke.yaml
  negative:
    missing_save: ASTRA_RUN_SAVE_MISSING
    malformed_input: ASTRA_SCRIPTED_INPUT_PARSE_FAILED
playable:
  script: native:/Scripts/opening
  extension_packages:
    - native:/Scripts/opening_lua
  routes:
    - id: walk
      entry: title
      branch_choice: 0
    - id: systems
      entry: title
      branch_choice: 1
  stage:
    width: 1280
    height: 720
  redistributable: true
  deterministic_profile: deterministic
  ui_system:
    title: true
    message_window: true
    nameplate: true
    choices: true
    system_menu: true
    backlog: true
    save_load_slots: 3
    config: true
    auto_skip_indicators: true
