schema: astra.input.scripted.v1
case_id: nativevn_system_save_load_systems
persona: advanced_player
objective: Exercise system UI, save, branch, load, alternate branch, and replay checkpoint.
sample: NativeVN
route: system_save_load_systems
expects:
  title_continue: true
  system_menu: true
  backlog: true
  config: true
  save_load: true
  route_walk: true
  route_systems: true
  replay_checkpoint: true
  windowed: true
events:
  - frame: 1
    action: start
  - frame: 4
    action: title_continue
  - frame: 8
    action: advance
  - frame: 12
    action: system_menu
  - frame: 16
    action: backlog
  - frame: 20
    action: config
    set:
      text_speed: fast
      bgm_volume: 0.65
      se_volume: 0.8
      voice_volume: 1.0
  - frame: 26
    action: save
    slot: 1
  - frame: 32
    action: choose
    index: 0
  - frame: 40
    action: load
    slot: 1
  - frame: 46
    action: choose
    index: 1
  - frame: 56
    action: replay_checkpoint
    label: branch_merge
  - frame: 64
    action: auto_close
