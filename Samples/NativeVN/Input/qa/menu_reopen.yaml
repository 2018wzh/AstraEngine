schema: astra.input.scripted.v1
case_id: nativevn_menu_reopen
persona: menu_heavy_player
objective: Reopen player-facing menus and save UI without losing visible state.
sample: NativeVN
route: menu_reopen
expects:
  title_continue: true
  system_menu: true
  backlog: true
  config: true
  save_load: true
  windowed: true
events:
  - frame: 1
    action: start
  - frame: 4
    action: title_continue
  - frame: 8
    action: system_menu
  - frame: 12
    action: system_menu
  - frame: 16
    action: backlog
  - frame: 20
    action: backlog
  - frame: 24
    action: config
    set:
      text_speed: fast
      bgm_volume: 0.65
      se_volume: 0.8
      voice_volume: 1.0
  - frame: 30
    action: config
  - frame: 36
    action: save
    slot: 1
  - frame: 44
    action: load
    slot: 1
  - frame: 52
    action: auto_close



