[workspace]
resolver = "2"
members = [
    "Engine/Source/Runtime/astra-core",
    "Engine/Source/Runtime/astra-runtime",
    "Engine/Source/Runtime/astra-plugin",
    "Engine/Source/Developer/astra-property",
    "Engine/Source/Developer/astra-property-derive",
    "Engine/Source/Developer/astra-test",
    "Engine/Source/Programs/astra-cli",
    "Engine/Plugins/Fixtures/headless-presentation-provider",
]

[workspace.package]
edition = "2021"
license = "MIT OR Apache-2.0"
version = "0.1.0"
rust-version = "1.85"

[workspace.dependencies]
abi_stable = "0.11"
blake3 = "1"
clap = { version = "4", features = ["derive"] }
hex = "0.4"
indexmap = { version = "2", features = ["serde"] }
libloading = "0.8"
miette = { version = "7", features = ["fancy"] }
postcard = { version = "1", features = ["alloc"] }
proc-macro2 = "1"
quote = "1"
schemars = { version = "0.8", features = ["uuid1"] }
semver = { version = "1", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
sha2 = "0.10"
syn = { version = "2", features = ["full"] }
thiserror = "1"
tracing = "0.1"
tracing-appender = "0.2"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
uuid = { version = "1", features = ["serde", "v4", "v7"] }
