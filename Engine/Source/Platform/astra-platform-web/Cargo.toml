[package]
name = "astra-platform-web"
edition.workspace = true
license.workspace = true
version.workspace = true
rust-version.workspace = true

[features]
default = []
web-code-check = []

[dependencies]
tracing.workspace = true
astra-core = { path = "../../Runtime/astra-core" }
astra-platform = { path = "../astra-platform" }
astra-platform-general = { path = "../astra-platform-general" }
tokio.workspace = true
serde_json.workspace = true
wgpu.workspace = true
rfd.workspace = true
gilrs = { workspace = true, features = ["wgi"] }
js-sys.workspace = true
wasm-bindgen.workspace = true
wasm-bindgen-futures.workspace = true
web-sys = { workspace = true, features = [
    "AudioBuffer",
    "AudioBufferSourceNode",
    "AudioContext",
    "AudioContextState",
    "AudioDestinationNode",
    "AudioNode",
    "AudioScheduledSourceNode",
    "AudioWorklet",
    "AudioWorkletNode",
    "BaseAudioContext",
    "CompositionEvent",
    "Document",
    "CssStyleDeclaration",
    "Element",
    "Event",
    "EventTarget",
    "HtmlCanvasElement",
    "HtmlElement",
    "Headers",
    "KeyboardEvent",
    "MessageEvent",
    "MessagePort",
    "MouseEvent",
    "Node",
    "PointerEvent",
    "Response",
    "Touch",
    "TouchEvent",
    "TouchList",
    "Url",
    "WheelEvent",
    "Window",
] }

[dev-dependencies]
wasm-bindgen-test.workspace = true
