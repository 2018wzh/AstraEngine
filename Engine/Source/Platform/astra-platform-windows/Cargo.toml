[package]
name = "astra-platform-windows"
edition.workspace = true
license.workspace = true
version.workspace = true
rust-version.workspace = true

[features]
default = []
platform-test-driver = []

[dependencies]
tracing.workspace = true
astra-core = { path = "../../Runtime/astra-core" }
astra-media = { path = "../../Runtime/astra-media" }
astra-platform = { path = "../astra-platform" }
astra-platform-general = { path = "../astra-platform-general" }
cpal.workspace = true
gilrs = { workspace = true, features = ["wgi"] }
rfd.workspace = true
pollster.workspace = true
tokio.workspace = true
wgpu.workspace = true
winit.workspace = true

[target.'cfg(windows)'.dependencies]
windows = { workspace = true, features = [
    "Win32_Foundation",
    "Win32_Graphics_Gdi",
    "Win32_System_Com",
    "Win32_System_Com_StructuredStorage",
    "Win32_UI_Input_XboxController",
    "Win32_UI_Input_KeyboardAndMouse",
    "Win32_UI_Shell",
    "Win32_UI_WindowsAndMessaging",
] }

[dev-dependencies]
tempfile.workspace = true
