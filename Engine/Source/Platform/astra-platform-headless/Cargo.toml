[package]
name = "astra-platform-headless"
edition.workspace = true
license.workspace = true
version.workspace = true
rust-version.workspace = true
publish = false

[features]
default = []
ffmpeg-vcpkg = ["astra-media/ffmpeg-vcpkg"]

[dependencies]
astra-core = { path = "../../Runtime/astra-core" }
astra-headless-protocol = { path = "../../Runtime/astra-headless-protocol" }
astra-media = { path = "../../Runtime/astra-media" }
astra-media-core = { path = "../../Runtime/astra-media-core" }
astra-platform = { path = "../astra-platform" }
astra-platform-common = { path = "../astra-platform-common" }
image.workspace = true
hound.workspace = true
reqwest.workspace = true
sha2.workspace = true
serde_json.workspace = true
tokio = { workspace = true, features = ["io-util", "net"] }
tracing.workspace = true
url.workspace = true

[dev-dependencies]
rcgen.workspace = true
tempfile.workspace = true
tokio-rustls.workspace = true
