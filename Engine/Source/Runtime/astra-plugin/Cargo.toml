[package]
name = "astra-plugin"
edition.workspace = true
license.workspace = true
version.workspace = true
rust-version.workspace = true

[features]
default = ["dynamic-abi"]
dynamic-abi = ["dep:abi_stable", "dep:libloading", "astra-plugin-abi/ffi"]

[dependencies]
abi_stable = { workspace = true, optional = true }
astra-core = { path = "../astra-core" }
astra-plugin-abi = { path = "../astra-plugin-abi", default-features = false }
astra-runtime = { path = "../astra-runtime" }
libloading = { workspace = true, optional = true }
postcard.workspace = true
schemars.workspace = true
semver.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_yaml.workspace = true
thiserror.workspace = true
tokio.workspace = true
tracing.workspace = true

[dev-dependencies]
astra-headless-test = { path = "../../Developer/astra-headless-test" }

[lib]
doctest = false
