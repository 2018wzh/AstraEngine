[package]
name = "astra-media"
edition.workspace = true
license.workspace = true
version.workspace = true
rust-version.workspace = true

[features]
default = []
desktop-wgpu = ["dep:wgpu"]
desktop-audio = ["dep:kira"]
ffmpeg = []
ffmpeg-vcpkg = ["ffmpeg", "dep:ffmpeg-next"]

[dependencies]
astra-core = { path = "../astra-core" }
astra-asset = { path = "../astra-asset" }
astra-media-core = { path = "../astra-media-core" }
astra-package = { path = "../astra-package" }
cosmic-text.workspace = true
ffmpeg-next = { workspace = true, optional = true }
image.workspace = true
kira = { workspace = true, optional = true }
postcard.workspace = true
schemars.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_yaml.workspace = true
symphonia.workspace = true
thiserror.workspace = true
tracing.workspace = true
unicode-segmentation.workspace = true
wgpu = { workspace = true, optional = true }

[target.'cfg(windows)'.dependencies]
windows = { workspace = true, features = [
    "Win32_Foundation",
    "Win32_Media_MediaFoundation",
    "Win32_System_Com",
    "Win32_System_Com_StructuredStorage",
    "Win32_System_Memory",
] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
js-sys.workspace = true
wasm-bindgen.workspace = true

[dev-dependencies]
tempfile.workspace = true
