[package]
name = "astra-player-web"
edition.workspace = true
license.workspace = true
version.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = []
web-code-check = ["astra-platform-web/web-code-check"]

[dependencies]
astra-core = { path = "../../Runtime/astra-core" }
astra-package = { path = "../../Runtime/astra-package" }
astra-platform = { path = "../../Platform/astra-platform" }
astra-platform-web = { path = "../../Platform/astra-platform-web" }
astra-player-core = { path = "../../Runtime/astra-player-core" }
astra-player-vn = { path = "../astra-player-vn" }
astra-ui-core = { path = "../../Runtime/astra-ui-core" }
astra-vn-core = { path = "../../Modules/AstraVN/astra-vn-core" }
astra-vn-package = { path = "../../Modules/AstraVN/astra-vn-package" }
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
futures-util.workspace = true
js-sys.workspace = true
web-sys = { workspace = true, features = [
    "console",
    "Response",
    "Window",
] }
wasm-bindgen.workspace = true
wasm-bindgen-futures.workspace = true

[dev-dependencies]
astra-package = { path = "../../Runtime/astra-package" }
wasm-bindgen-test.workspace = true
