[package]
name = "astra-cli"
edition.workspace = true
license.workspace = true
version.workspace = true
rust-version.workspace = true

[[bin]]
name = "astra"
path = "src/main.rs"

[dependencies]
astra-asset = { path = "../../Runtime/astra-asset" }
astra-observability = { path = "../../Developer/astra-observability" }
astra-core = { path = "../../Runtime/astra-core" }
astra-cook = { path = "../../Developer/astra-cook" }
astra-package = { path = "../../Runtime/astra-package" }
astra-player-core = { path = "../../Runtime/astra-player-core" }
astra-platform = { path = "../../Platform/astra-platform" }
astra-platform-android = { path = "../../Platform/astra-platform-android" }
astra-platform-ios = { path = "../../Platform/astra-platform-ios" }
astra-platform-linux = { path = "../../Platform/astra-platform-linux" }
astra-platform-macos = { path = "../../Platform/astra-platform-macos" }
astra-platform-web = { path = "../../Platform/astra-platform-web" }
astra-platform-windows = { path = "../../Platform/astra-platform-windows" }
astra-release = { path = "../../Developer/astra-release" }
astra-target = { path = "../../Platform/astra-target" }
astra-test = { path = "../../Developer/astra-test" }
astra-vn = { path = "../../Modules/AstraVN/astra-vn" }
clap.workspace = true
image.workspace = true
schemars.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_yaml.workspace = true
tracing.workspace = true
tempfile.workspace = true

[dev-dependencies]

[target.'cfg(windows)'.dependencies]
windows = { workspace = true, features = [
    "Win32_Foundation",
    "Win32_Graphics_Gdi",
    "Win32_System_LibraryLoader",
    "Win32_UI_WindowsAndMessaging",
] }
