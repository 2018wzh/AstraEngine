[package]
name = "astra-player"
edition.workspace = true
license.workspace = true
version.workspace = true

[features]
default = []
platform-test-driver = [
    "astra-platform-windows/platform-test-driver",
    "astra-platform-linux/platform-test-driver",
    "astra-platform-macos/platform-test-driver",
]

[lib]
doctest = false
name = "astra_player"
path = "src/lib.rs"

[[bin]]
name = "astra-player"
path = "src/main.rs"

[dependencies]
tracing.workspace = true
base64.workspace = true
astra-core = { path = "../../Runtime/astra-core" }
astra-observability = { path = "../../Developer/astra-observability" }
astra-package = { path = "../../Runtime/astra-package" }
astra-platform = { path = "../../Platform/astra-platform" }
astra-player-core = { path = "../../Runtime/astra-player-core" }
astra-player-vn = { path = "../astra-player-vn" }
astra-ui-core = { path = "../../Runtime/astra-ui-core" }
astra-vn-core = { path = "../../Modules/AstraVN/astra-vn-core" }
astra-vn-package = { path = "../../Modules/AstraVN/astra-vn-package" }
serde.workspace = true
serde_json.workspace = true
serde_yaml.workspace = true
tokio.workspace = true
tungstenite.workspace = true
tempfile.workspace = true

[target.'cfg(windows)'.dependencies]
astra-platform-windows = { path = "../../Platform/astra-platform-windows" }
astra-ui-component-host = { path = "../astra-ui-component-host" }
astra-ui-plugin-abi = { path = "../../Runtime/astra-ui-plugin-abi" }

[target.'cfg(target_os = "linux")'.dependencies]
astra-platform-linux = { path = "../../Platform/astra-platform-linux" }

[target.'cfg(target_os = "macos")'.dependencies]
astra-platform-macos = { path = "../../Platform/astra-platform-macos" }

[dev-dependencies]
astra-headless-test = { path = "../../Developer/astra-headless-test" }
tempfile.workspace = true
astra-asset = { path = "../../Runtime/astra-asset" }
astra-media = { path = "../../Runtime/astra-media" }
astra-media-core = { path = "../../Runtime/astra-media-core" }
