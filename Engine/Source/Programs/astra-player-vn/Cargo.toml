[package]
name = "astra-player-vn"
edition.workspace = true
license.workspace = true
version.workspace = true

[features]
default = []
platform-test-driver = ["astra-platform-windows/platform-test-driver"]
headless-test-fixtures = []

[dependencies]
astra-core = { path = "../../Runtime/astra-core" }
astra-asset = { path = "../../Runtime/astra-asset" }
astra-media-core = { path = "../../Runtime/astra-media-core" }
astra-media = { path = "../../Runtime/astra-media" }
astra-package = { path = "../../Runtime/astra-package" }
astra-plugin = { path = "../../Runtime/astra-plugin", default-features = false }
astra-plugin-abi = { path = "../../Runtime/astra-plugin-abi", default-features = false }
astra-player-core = { path = "../../Runtime/astra-player-core" }
astra-ui-core = { path = "../../Runtime/astra-ui-core" }
astra-ui-yakui = { path = "../../Runtime/astra-ui-yakui" }
astra-runtime = { path = "../../Runtime/astra-runtime" }
astra-platform = { path = "../../Platform/astra-platform" }
astra-vn-core = { path = "../../Modules/AstraVN/astra-vn-core" }
astra-vn-runtime-provider = { path = "../../Modules/AstraVN/astra-vn-runtime-provider", default-features = false }
astra-vn-package = { path = "../../Modules/AstraVN/astra-vn-package" }
astra-vn-presentation = { path = "../../Modules/AstraVN/astra-vn-presentation" }
astra-vn-system = { path = "../../Modules/AstraVN/astra-vn-system" }
astra-vn-ui = { path = "../../Modules/AstraVN/astra-vn-ui" }
image.workspace = true
postcard.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tracing.workspace = true

[dev-dependencies]
astra-headless-test = { path = "../../Developer/astra-headless-test" }
astra-platform = { path = "../../Platform/astra-platform" }
astra-platform-windows = { path = "../../Platform/astra-platform-windows" }
tokio.workspace = true

[lib]
doctest = false
