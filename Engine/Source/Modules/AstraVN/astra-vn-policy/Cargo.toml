[package]
name = "astra-vn-policy"
edition.workspace = true
license.workspace = true
version.workspace = true
rust-version.workspace = true

[features]
default = ["luau-runtime"]
luau-runtime = ["astra-policy/luau-runtime", "dep:mlua"]

[dependencies]
astra-core = { path = "../../../Runtime/astra-core" }
astra-policy = { path = "../../../Runtime/astra-policy", default-features = false }
astra-vn-script = { path = "../astra-vn-script" }
mlua = { workspace = true, optional = true }
postcard.workspace = true
schemars.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tracing.workspace = true
