id: astra.plugin.default_runtime_providers
display_name: Default Runtime Providers
version: 0.1.0
astra_api: ">=0.1 <0.2"
modules:
  - id: default_runtime_providers.runtime
    type: runtime
    entrypoint: Bin/win64/DefaultRuntimeProvidersPlugin.dll
    load_phase: core_startup
    capabilities:
      - platform_provider
      - renderer_provider
      - audio_provider
      - project_content_provider
    permissions:
      runtime:
        packaged: true
    platforms:
      - windows-x64
dependencies: []
