name: ci

on:
  push:
  pull_request:

jobs:
  headless-platform:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Docs
        run: python Tools/check_docs.py
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Build Headless test driver
        run: cargo build -p astra-headless
      - name: Test
        run: cargo test --workspace
      - name: Headless convergence
        run: python Tools/check_headless_test_convergence.py
      - name: Shipping dependency isolation
        run: python Tools/check_headless_shipping_graph.py
      - name: Headless acceptance tooling
        run: python -m unittest Tools.tests.test_run_platform_host_acceptance

  headless-video-ffmpeg:
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Checkout vcpkg
        run: git clone --depth 1 https://github.com/microsoft/vcpkg.git vcpkg
      - name: Bootstrap vcpkg
        run: .\vcpkg\bootstrap-vcpkg.bat -disableMetrics
      - name: Install FFmpeg
        run: .\vcpkg\vcpkg.exe install ffmpeg:x64-windows --clean-after-build
      - name: Configure FFmpeg runtime
        run: python -c "import os,pathlib; root=pathlib.Path(os.environ['VCPKG_ROOT'])/'installed'/os.environ['VCPKG_DEFAULT_TRIPLET']; pathlib.Path(os.environ['GITHUB_PATH']).open('a', encoding='utf-8').write(str(root/'debug'/'bin')+'\n'+str(root/'bin')+'\n')"
      - name: Clippy with FFmpeg
        run: cargo clippy --workspace --all-targets --features ffmpeg-vcpkg -- -D warnings
      - name: Build Headless test driver with FFmpeg
        run: cargo build -p astra-headless --features ffmpeg-vcpkg
      - name: Test with FFmpeg
        run: cargo test --workspace --features ffmpeg-vcpkg
