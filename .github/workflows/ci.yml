name: ci

on:
  push:
  pull_request:

jobs:
  headless-platform:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes libasound2-dev libudev-dev
      - name: Docs
        run: python Tools/check_docs.py
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: python Tools/run_cargo_isolated.py clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: python Tools/run_cargo_isolated.py test --workspace
      - name: Headless convergence
        run: python Tools/check_headless_test_convergence.py
      - name: Shipping dependency isolation
        run: python Tools/check_headless_shipping_graph.py
      - name: Headless acceptance tooling
        run: python -m unittest Tools.tests.test_run_cargo_isolated Tools.tests.test_run_platform_host_acceptance

  headless-video-ffmpeg:
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Checkout vcpkg
        run: git clone --depth 1 https://github.com/microsoft/vcpkg.git vcpkg
      - name: Bootstrap vcpkg
        run: .\vcpkg\bootstrap-vcpkg.bat -disableMetrics
      - name: Install FFmpeg
        run: .\vcpkg\vcpkg.exe install ffmpeg:x64-windows --clean-after-build
      - name: Clippy with FFmpeg
        run: python Tools/run_cargo_isolated.py clippy --workspace --all-targets --features ffmpeg-vcpkg -- -D warnings
      - name: Test with FFmpeg
        run: python Tools/run_cargo_isolated.py test --workspace --features ffmpeg-vcpkg
