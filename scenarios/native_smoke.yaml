schema: astra.scenario.v1
stage: stage1-enginecore
seed: 42
actions:
  - launch: {}
  - register_fixture_actions: {}
  - add_state_machine:
      id: fixture_machine
      trigger: fixture.start
      actions:
        - action_id: astra.fixture.action.set_flag
          input: {}
  - emit:
      kind: dialogue
      data:
        speaker: narrator
        text: EngineCore native smoke.
  - advance: { ticks: 1 }
  - emit:
      kind: choice
      data:
        prompt: route?
        options:
          - library
          - rooftop
  - choose: library
  - schedule_delayed_event:
      due_tick: 5
      kind: timer.native_smoke
  - emit:
      kind: fixture.start
  - advance: { ticks: 3 }
  - save: slot.auto
  - load: slot.auto
  - replay_from_start: {}
assertions:
  - replay_hash_match: true
  - no_blocking_diagnostics: true
