schema: astra.project.v1
id: com.example.nativevn
targets:
  - id: nativevn-game
    kind: game
    crate: astra-vn
    default_profile: classic
    runtime_provider: native_vn
    platforms: [headless, windows, web]
    packaged: true
nativevn:
  sources:
    - Scripts
  profiles: [classic, modern]
  scenario_refs:
    - scenarios/full_playthrough.yaml
