schema: astra.scenario.v1
id: scenarios.advanced_presentation
package: target/advancedvn.astrapkg
profile: advanced-vn
seed: 42
actions:
  - launch: {}
  - wait_for: scene.opening_room
  - assert_presentation:
      stage_layers: [bg, characters, video_fx, ui]
      camera_task: camera.push
      video_layer: video_fx
  - wait_for: dialogue
  - assert_voice_sync:
      voice: voice.hero.0001
      text: line.hello
  - advance: {}
  - wait_for: choice
  - choose: 0
  - wait_for: system.save
  - open_system_page: config
  - open_system_page: backlog
  - save_slot: 1
  - load_slot: 1
  - replay_from_start: {}
assertions:
  - route: state.library
  - check: vn.commercial_baseline
  - check: vn.system_ui_profile
  - check: vn.advanced_presentation
  - check: command.provider_binding
  - save_load_hash_match: true
  - replay_hash_match: true
  - report_omits_private_paths: true
