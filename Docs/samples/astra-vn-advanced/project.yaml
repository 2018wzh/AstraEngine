schema: astra.project.v1
id: com.example.astra.advanced_vn
platform_profiles:
  windows-release:
    schema: astra.platform_host_profile.v2
    id: windows-release
    platform: windows
    target: advanced-vn-game
    package_id: com.example.astra.advanced_vn
    renderer: { providers: [wgpu_hardware], allow_software: false }
    decode: { providers: [wmf], allow_software: false }
    audio: { providers: [wasapi], allow_software: false }
    save: { providers: [saved_games], allow_software: false }
    package_sources:
      - { kind: bundled }
      - { kind: user_authorized }
    limits: { command_queue_capacity: 256, event_queue_capacity: 1024, max_frame_bytes: 67108864, max_audio_frames: 192000, max_package_read_bytes: 8388608 }
    package_cache: { max_entry_bytes: 17179869184, max_total_bytes: 68719476736 }
  web-release-chrome:
    schema: astra.platform_host_profile.v2
    id: web-release-chrome
    platform: web
    target: advanced-vn-game
    package_id: com.example.astra.advanced_vn
    renderer: { providers: [webgpu], allow_software: false }
    decode: { providers: [webcodecs], allow_software: false }
    audio: { providers: [webaudio], allow_software: false }
    save: { providers: [opfs], allow_software: false }
    package_sources:
      - { kind: bundled }
      - { kind: user_authorized }
      - kind: https_range
        allowed_origins: [https://cdn.example.invalid]
    limits: { command_queue_capacity: 256, event_queue_capacity: 1024, max_frame_bytes: 67108864, max_audio_frames: 192000, max_package_read_bytes: 8388608 }
    package_cache: { max_entry_bytes: 17179869184, max_total_bytes: 68719476736 }

targets:
  - id: advanced-vn-game
    kind: game
    crate: astra-vn
    default_profile: advanced-vn
    runtime_provider: native_vn
    platforms: [windows, linux, macos, ios, android, web]
    packaged: true
profiles:
  - nativevn-commercial
  - advanced-vn
command_providers:
  show: astra.vn.standard
  hide: astra.vn.standard
  move: astra.vn.standard
  camera: astra.vn.standard
  transition: astra.vn.standard
  shake: astra.vn.standard
  movie: astra.vn.standard
  voice: astra.vn.standard
  bgm: astra.vn.standard
  se: astra.vn.standard
  wait: astra.vn.standard
  choice: astra.vn.standard
  system_page: astra.vn.system
luau:
  runtime: luau
  policy_bundle: com.example.advanced_presentation
  entry: advanced_policy.luau
  capabilities:
    - astra.vn.policy_bundle
    - astra.vn.command_extension
    - filter_graph.node
    - text_effect.policy
system_stories:
  title: system.title
  save: system.save
  load: system.load
  config: system.config
  backlog: system.backlog
  gallery: system.gallery
  replay: system.replay
  route_chart: system.route_chart
  voice_replay: system.voice_replay
  localization_preview: system.localization_preview
release_checks:
  required:
    - vn.commercial_baseline
    - vn.system_ui_profile
    - vn.advanced_presentation
    - plugin.extension_registry
